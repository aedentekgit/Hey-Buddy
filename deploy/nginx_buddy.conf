# --- PRODUCTION ENVIRONMENT ---

server {
    listen 80;
    server_name ayuskart.com www.ayuskart.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ayuskart.com www.ayuskart.com;

    ssl_certificate /etc/letsencrypt/live/ayuskart.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ayuskart.com/privkey.pem;

    root /var/www/buddy_prod/current/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://localhost:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /socket.io/ {
        proxy_pass http://localhost:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /uploads/ {
        proxy_pass http://localhost:5001/uploads/;
        proxy_set_header Host $host;
    }
}


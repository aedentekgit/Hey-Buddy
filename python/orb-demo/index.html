<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hey buddy Orb Demo</title>
    <!-- Link to the separated CSS file -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- This is the empty container the Orb will attach to -->
    <div id="orb-container"></div>

    <!-- UI Elements sitting on top of the orb -->
    <div class="controls">
        <h2>Hey buddy Engine</h2>
        <!-- The functions below live in the new main.js file -->
        <button onclick="simulateSpeaking()">Simulate "Currently Speaking"</button>
        <button onclick="simulateIdle()">Return to "Silent/Idle"</button>
    </div>

    <!-- 1. Load the WebGL Engine Core -->
    <script src="buddy-orb-standalone.js"></script>

    <!-- 2. Load the Setup and Interactive Logic -->
    <script src="main.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hey buddy Orb Demo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050510;
            /* Matches the dark navy void */
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Test Buttons */
        .controls {
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            background: #2a75d3;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #3b8cf0;
        }

        button:focus {
            outline: none;
        }
    </style>
</head>

<body>

    <!-- This is the empty container the Orb will attach to -->
    <div id="orb-container"></div>

    <!-- UI Elements sitting on top of the orb -->
    <div class="controls">
        <h2>Hey buddy Engine</h2>
        <button onclick="myOrb.setActive(true)">Simulate "Currently Speaking"</button>
        <button onclick="myOrb.setActive(false)">Return to "Silent/Idle"</button>
    </div>

    <!-- Load the JS Script that was already created from a previous conversation -->
    <script src="buddy-orb-standalone.js"></script>
    <script>
        // Start the Orb Engine
        const myOrb = new OrbComponent('orb-container', {
            hue: 0,                   // 0 = Default Purple/Cyan
            hoverIntensity: 0.3       // How aggressively it wiggles when "Speaking"
        });
    </script>
</body>

</html>
